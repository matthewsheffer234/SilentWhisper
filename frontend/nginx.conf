# Serves the production static build (frontend/Dockerfile) on port 3000,
# matching the port docker-compose.yml already publishes as 127.0.0.1:3101.
# Replaces nginx:alpine's stock default.conf entirely.
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite's build output hashes every asset filename by content
    # (frontend/vite.config.js's default, dist/assets/*-<hash>.js/.css) — the
    # same name never means different content, so these are safe to cache
    # indefinitely. This is exactly the caching story the old Vite dev server
    # had none of (ARCHITECTURE_REVIEW_(Claude).md Risk 3).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Everything else — including React Router's client-side routes like
    # /invite/:token (frontend/src/main.jsx) — falls back to index.html so
    # the client-side router can handle it. A hard refresh or a shared deep
    # link must not 404 at the static-file layer just because there's no
    # physical file at that path. Never cached, since index.html is the one
    # file that references the current build's hashed asset filenames.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri /index.html;
    }
}
