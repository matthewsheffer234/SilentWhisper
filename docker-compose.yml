# Local test environment for Silent Whisper. Independent Compose stack (its
# own network, `postgres`/`migrate` never join anything else) — but `backend`
# and `frontend` are ALSO attached to `wireservice_default` (declared as
# external below) so the shared nginx can reach them by container name.
#
# This supersedes an earlier design note that assumed a host.docker.internal
# pattern like wireservice-dev's: that doesn't actually work here, because
# these ports are bound to 127.0.0.1 (deliberately, for security — never
# 0.0.0.0, see the note on wireservice-dev-frontend-1/-api-1 doing that) and
# host.docker.internal traffic arrives via the Docker bridge gateway, a
# different source address than localhost, which a loopback-only bind
# rejects. Joining wireservice_default directly avoids needing to choose
# between "reachable from nginx" and "not reachable from the internet."
#
# Resource limits follow the Local Test Environment Resource Envelope
# (Section 2): this host has 8 vCPU / 30GB RAM / no GPU, and memory is not
# the binding constraint here.

services:
  # pgvector/pgvector:pg16, not postgres:16-alpine (FEATURE_REQUEST.md entry 1,
  # semantic search): a drop-in image built FROM postgres:16 with the vector
  # extension precompiled — same official entrypoint scripts, same
  # pg_isready healthcheck behavior, just able to run
  # `CREATE EXTENSION vector`, which plain postgres:16-alpine cannot. Pulling
  # this image is a one-time network fetch (dependency acquisition, same
  # carve-out CLAUDE.md's "What isn't offline-safe" already gives
  # `docker compose build`/`npm install`) — the stack stays fully offline
  # once it's present locally.
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - silent_whisper_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Bumped from 1g (Local Test Environment Resource Envelope, Section 2):
    # the Debian-based pgvector image has a slightly heavier baseline than
    # postgres:16-alpine, plus HNSW index build/maintenance headroom for
    # message_embeddings. Still well inside the free RAM that section
    # documents.
    mem_limit: 1536m

  # One-shot migration runner. Not started by `docker compose up` (profile
  # gated) — run explicitly with `docker compose run --rm migrate` after
  # postgres is healthy. Uses the same image as `backend`, which includes
  # both /backend and /database (see backend/Dockerfile).
  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    command: ["npm", "run", "migrate"]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      silent-whisper-ollama:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8000
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3101}
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://silent-whisper-ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-mistral}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      LLM_MAX_INPUT_CHARS: ${LLM_MAX_INPUT_CHARS:-12000}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-512}
      LLM_MAX_CONCURRENT_REQUESTS: ${LLM_MAX_CONCURRENT_REQUESTS:-1}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_STREAMING_ENABLED: ${LLM_STREAMING_ENABLED:-true}
      LLM_SUMMARY_PROMPT_VERSION: ${LLM_SUMMARY_PROMPT_VERSION:-v1}
      LLM_TASK_PROMPT_VERSION: ${LLM_TASK_PROMPT_VERSION:-v1}
      LLM_HEALTH_CHECK_INTERVAL_MS: ${LLM_HEALTH_CHECK_INTERVAL_MS:-60000}
      # Semantic search (FEATURE_REQUEST.md entry 1): a separate, smaller
      # embedding model on the same local provider/host as LLM_* above —
      # config.embedding in backend/src/config.js reuses LLM_PROVIDER's live
      # (admin-editable) value and LLM_BASE_URL/LLM_API_KEY rather than
      # duplicating them here.
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-minilm}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
    ports:
      - "127.0.0.1:8101:8000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    networks:
      - default
      - wireservice_default

  # Dedicated Ollama instance for Silent Whisper (PROJECT_PLAN.md Section 2:
  # "isolated from Silent Lattice's own two Ollama instances, so
  # restarting/upgrading one doesn't affect the other"). Not on
  # wireservice_default — only the backend talks to it, over the default
  # network, never exposed to nginx or the host.
  silent-whisper-ollama:
    image: ollama/ollama:latest
    volumes:
      - silent_whisper_ollama_models:/root/.ollama
    mem_limit: 6g
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  # One-shot: pulls the configured generation model AND the embedding model
  # (FEATURE_REQUEST.md entry 1, semantic search) into the volume above. Not
  # started by `docker compose up` (profile gated, same pattern as
  # `migrate`) — run explicitly once after silent-whisper-ollama is up:
  # `docker compose run --rm ollama-pull-model`. Idempotent — `ollama pull`
  # no-ops if a model (and digest) is already present.
  ollama-pull-model:
    image: ollama/ollama:latest
    profiles: ["tools"]
    depends_on:
      silent-whisper-ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${LLM_MODEL:-mistral} && ollama pull ${EMBEDDING_MODEL:-all-minilm}"]
    environment:
      OLLAMA_HOST: silent-whisper-ollama:11434

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8101/api}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8101/ws}
    ports:
      - "127.0.0.1:3101:3000"
    mem_limit: 128m
    networks:
      - default
      - wireservice_default

volumes:
  silent_whisper_pgdata:
  silent_whisper_ollama_models:

networks:
  # Already created by ~/wireservice's own `docker compose` (or, currently,
  # its ad hoc `docker run` — either way this network already exists on the
  # host before Silent Whisper's stack comes up).
  wireservice_default:
    external: true
