# Local test environment for Silent Whisper. Independent Compose stack (its
# own network, `postgres`/`migrate` never join anything else) — but `backend`
# and `frontend` are ALSO attached to `wireservice_default` (declared as
# external below) so the shared nginx can reach them by container name.
#
# This supersedes an earlier design note that assumed a host.docker.internal
# pattern like wireservice-dev's: that doesn't actually work here, because
# these ports are bound to 127.0.0.1 (deliberately, for security — never
# 0.0.0.0, see the note on wireservice-dev-frontend-1/-api-1 doing that) and
# host.docker.internal traffic arrives via the Docker bridge gateway, a
# different source address than localhost, which a loopback-only bind
# rejects. Joining wireservice_default directly avoids needing to choose
# between "reachable from nginx" and "not reachable from the internet."
#
# Resource limits follow the Local Test Environment Resource Envelope
# (Section 2): this host has 8 vCPU / 30GB RAM / no GPU, and memory is not
# the binding constraint here.
#
# postgres/backend/frontend host ports are overridable
# (POSTGRES_HOST_PORT/BACKEND_HOST_PORT/FRONTEND_HOST_PORT, defaults
# unchanged: 5433/8101/3101) — docs/plans/active/SHIPMENT_PLAN.md Section 1.3's progress log:
# this exists so scripts/airgap-install.sh can be rehearsed end-to-end
# (distinct ports + COMPOSE_PROJECT_NAME) on a host already running a real
# deployment from the default ports, without colliding with it. Not meant to
# be set for a normal run — real deployments should stick to the defaults.

# docs/plans/active/SHIPMENT_PLAN.md Section 2.6: json-file's default is unbounded growth.
# docker-compose.enclave.yml already had this (added alongside Section 1.1);
# added here too so this host's own long-running containers get the same
# rotation, not just the enclave override.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  # pgvector/pgvector:pg16, not postgres:16-alpine (FEATURE_REQUEST.md entry 1,
  # semantic search): a drop-in image built FROM postgres:16 with the vector
  # extension precompiled — same official entrypoint scripts, same
  # pg_isready healthcheck behavior, just able to run
  # `CREATE EXTENSION vector`, which plain postgres:16-alpine cannot. Pulling
  # this image is a one-time network fetch (dependency acquisition, same
  # carve-out CLAUDE.md's "What isn't offline-safe" already gives
  # `docker compose build`/`npm install`) — the stack stays fully offline
  # once it's present locally.
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - silent_whisper_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging
    # Bumped from 1g (Local Test Environment Resource Envelope, Section 2):
    # the Debian-based pgvector image has a slightly heavier baseline than
    # postgres:16-alpine, plus HNSW index build/maintenance headroom for
    # message_embeddings. Still well inside the free RAM that section
    # documents.
    mem_limit: 1536m

  # One-shot migration runner. Not started by `docker compose up` (profile
  # gated) — run explicitly with `docker compose run --rm migrate` after
  # postgres is healthy. Uses the same image as `backend`, which includes
  # both /backend and /database (see backend/Dockerfile).
  migrate:
    build:
      context: .
      dockerfile: backend/Dockerfile
    profiles: ["tools"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
    command: ["npm", "run", "migrate"]
    logging: *default-logging

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      silent-whisper-ollama:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 8000
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      APP_DB_USER: ${APP_DB_USER}
      APP_DB_PASSWORD: ${APP_DB_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3101}
      JWT_SECRET: ${JWT_SECRET}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://silent-whisper-ollama:11434}
      LLM_MODEL: ${LLM_MODEL:-mistral}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-30000}
      LLM_MAX_INPUT_CHARS: ${LLM_MAX_INPUT_CHARS:-12000}
      LLM_MAX_OUTPUT_TOKENS: ${LLM_MAX_OUTPUT_TOKENS:-512}
      LLM_MAX_CONCURRENT_REQUESTS: ${LLM_MAX_CONCURRENT_REQUESTS:-1}
      # FEATURE_REQUEST.md entry 2 — bounds the in-memory FIFO wait queue
      # beyond LLM_MAX_CONCURRENT_REQUESTS; not admin-editable.
      AI_QUEUE_MAX_DEPTH: ${AI_QUEUE_MAX_DEPTH:-8}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.3}
      LLM_STREAMING_ENABLED: ${LLM_STREAMING_ENABLED:-true}
      LLM_SUMMARY_PROMPT_VERSION: ${LLM_SUMMARY_PROMPT_VERSION:-v2}
      LLM_TASK_PROMPT_VERSION: ${LLM_TASK_PROMPT_VERSION:-v2}
      LLM_DIGEST_PROMPT_VERSION: ${LLM_DIGEST_PROMPT_VERSION:-v2}
      LLM_HEALTH_CHECK_INTERVAL_MS: ${LLM_HEALTH_CHECK_INTERVAL_MS:-60000}
      # Security.md (2026-07-15, MEDIUM: LLM baseUrl SSRF/DoS) — allowlist of
      # origins the admin-editable `baseUrl` setting may be changed to;
      # config.js falls back to LLM_BASE_URL's own origin if this is unset.
      ALLOWED_LLM_ORIGINS: ${ALLOWED_LLM_ORIGINS:-}
      # Cross-channel "Catch Me Up" workspace digest (FEATURE_REQUEST.md entry
      # 6) — operational safety cap, not admin-editable. 336 = 14 days.
      AI_DIGEST_MAX_WINDOW_HOURS: ${AI_DIGEST_MAX_WINDOW_HOURS:-336}
      # Semantic search (FEATURE_REQUEST.md entry 1): a separate, smaller
      # embedding model on the same local provider/host as LLM_* above —
      # config.embedding in backend/src/config.js reuses LLM_PROVIDER's live
      # (admin-editable) value and LLM_BASE_URL/LLM_API_KEY rather than
      # duplicating them here.
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-minilm}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-384}
      EMBEDDING_TIMEOUT_MS: ${EMBEDDING_TIMEOUT_MS:-15000}
      EMBEDDING_MAX_CONCURRENT_REQUESTS: ${EMBEDDING_MAX_CONCURRENT_REQUESTS:-1}
      EMBEDDING_WORKER_INTERVAL_MS: ${EMBEDDING_WORKER_INTERVAL_MS:-2000}
      EMBEDDING_WORKER_BATCH_SIZE: ${EMBEDDING_WORKER_BATCH_SIZE:-3}
      EMBEDDING_MAX_ATTEMPTS: ${EMBEDDING_MAX_ATTEMPTS:-5}
      # Inline Markdown checkbox tasks (FEATURE_REQUEST.md entry 3). Must
      # match the frontend build's VITE_TASK_OWNER_TOKEN_ALIAS (see the
      # frontend service below) — no runtime handshake between the two.
      TASK_OWNER_TOKEN_ALIAS: ${TASK_OWNER_TOKEN_ALIAS:-owner}
      TASK_DASHBOARD_WINDOW_DAYS: ${TASK_DASHBOARD_WINDOW_DAYS:-30}
    ports:
      - "127.0.0.1:${BACKEND_HOST_PORT:-8101}:8000"
    healthcheck:
      # /health/live, not /health (docs/plans/active/SHIPMENT_PLAN.md Section 2.2): /health
      # returns 503 whenever checkDbConnection() fails, which makes Docker's
      # liveness probe couple container restarts to Postgres availability —
      # a routine Postgres maintenance window would trip a restart of an
      # otherwise-fine backend process. /health/live only proves the Node
      # process is up and Express is routing (backend/src/index.js), with no
      # DB or LLM-provider touch. (ai.healthy never flips /health's own HTTP
      # status today — additive JSON only — so this is not fixing a "vLLM
      # blip causes a restart loop" risk, which isn't currently real; it's
      # fixing the DB-coupling risk, which is.)
      test: ["CMD", "node", "-e", "fetch('http://localhost:8000/health/live').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 512m
    logging: *default-logging
    networks:
      - default
      - wireservice_default

  # Dedicated Ollama instance for Silent Whisper (PROJECT_PLAN.md Section 2:
  # "isolated from Silent Lattice's own two Ollama instances, so
  # restarting/upgrading one doesn't affect the other"). Not on
  # wireservice_default — only the backend talks to it, over the default
  # network, never exposed to nginx or the host.
  silent-whisper-ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - silent_whisper_ollama_models:/root/.ollama
    mem_limit: 6g
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s
    logging: *default-logging

  # One-shot: pulls the configured generation model AND the embedding model
  # (FEATURE_REQUEST.md entry 1, semantic search) into the volume above. Not
  # started by `docker compose up` (profile gated, same pattern as
  # `migrate`) — run explicitly once after silent-whisper-ollama is up:
  # `docker compose run --rm ollama-pull-model`. Idempotent — `ollama pull`
  # no-ops if a model (and digest) is already present.
  ollama-pull-model:
    image: ollama/ollama:latest
    profiles: ["tools"]
    depends_on:
      silent-whisper-ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${LLM_MODEL:-mistral} && ollama pull ${EMBEDDING_MODEL:-all-minilm}"]
    environment:
      OLLAMA_HOST: silent-whisper-ollama:11434
    logging: *default-logging

  frontend:
    # Production static build (FEATURE_REQUEST.md "the deploy loop" entry,
    # 2026-07-18) — Vite inlines VITE_API_URL/VITE_WS_URL into the built
    # bundle at build time, so they're build args here, not runtime
    # `environment:` (that stopped taking effect the moment this service
    # switched off the old dev-server image; see RUNBOOK.md, Frontend
    # Development). docker-compose.dev.yml is the opt-in override that
    # restores the old dev-server image + runtime environment vars.
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8101/api}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8101/ws}
        # Must match the backend's TASK_OWNER_TOKEN_ALIAS above exactly — no
        # runtime handshake between them, only agreement at build/deploy time.
        VITE_TASK_OWNER_TOKEN_ALIAS: ${TASK_OWNER_TOKEN_ALIAS:-owner}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-3101}:3000"
    # Lowered from 512m (FEATURE_REQUEST.md "the deploy loop" entry,
    # 2026-07-18): that limit was sized for the old Vite dev server's esbuild
    # dependency pre-bundling on cold start (see the lucide-react entry this
    # comment used to describe) — nginx serving a handful of static files has
    # nothing comparable to pre-bundle. Measured actual usage at ~8MiB via
    # `docker stats` against a standalone container, so 64m is real headroom
    # (~8x), not a guess.
    mem_limit: 64m
    logging: *default-logging
    networks:
      - default
      - wireservice_default

volumes:
  silent_whisper_pgdata:
  silent_whisper_ollama_models:

networks:
  # Already created by ~/wireservice's own `docker compose` (or, currently,
  # its ad hoc `docker run` — either way this network already exists on the
  # host before Silent Whisper's stack comes up).
  wireservice_default:
    external: true
